name: example
description: A sample command-line application.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

scripts:
  # To generate .g files:
  runner:watch: dart run build_runner watch --delete-conflicting-outputs --verbose

dependencies:
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_routing: { path: ../../shelf_routing }
  shelf_static: ^1.1.2
  shelf_swagger_ui: ^1.0.0+2

  mek_data_class: ^1.4.0
  json_annotation: ^4.8.1

  decimal: ^2.3.3

dev_dependencies:
  mek_lints: ^1.0.0

  build_runner: ^2.4.7
  mek_data_class_generator: ^1.5.1
  json_serializable: ^6.7.1
  shelf_routing_generator: { path: .. }
