targets:
  $default:
    builders:
      shelf_open_api_generator:
        enabled: false
      shelf_open_api_generator:shelf_routing:
        enabled: false

      json_serializable:
        generate_for:
          - lib/src/config.dart
        options:
          create_factory: false
          create_to_json: false

builders:
  shelf_routing_generator:router:
    import: package:shelf_routing_generator/run_router_builder.dart
    builder_factories: [ 'runRouterBuilder' ]
#    runs_before: [ 'shelf_routing_generator:routing' ]
    applies_builders: [ 'source_gen:combining_builder' ]
    build_extensions: { '.dart': [ '.router.g.part', '.routers.json' ] }
    auto_apply: dependents
    build_to: cache

  shelf_routing_generator:routing:
    import: package:shelf_routing_generator/run_routing_builder.dart
    builder_factories: [ 'runRoutingBuilder' ]
    required_inputs: [ '.routing.json' ]
    applies_builders: [ 'source_gen:combining_builder' ]
    build_extensions: { '.dart': [ '.routing.dart' ] }
    auto_apply: dependents
    build_to: source



